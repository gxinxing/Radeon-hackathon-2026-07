seed: 42
exp_name: walker_walk
num_envs: 4096
show_viewer: false
task: chase

env:
  dt: 0.02
  substeps: 1
  episode_length_s: 20.0
  resampling_time_s: 4.0
  action_scale: 0.5
  clip_actions: 100.0
  simulate_action_latency: false

  robot_urdf: "xml/walker.xml"
  kp: 200.0
  kd: 5.0
  base_init_pos: [0.0, 0.0, 1.0]
  base_init_quat: [1.0, 0.0, 0.0, 0.0]
  obs_history_length: 1
  fall_height: 0.4

  ball_radius: 0.11
  field: [14.0, 9.0]
  goal_width: 2.6
  circle_radius: 1.5
  penalty_area_length: 3.0
  penalty_area_width: 6.0
  fall_height: 0.4
  termination_pitch_deg: 45
  termination_roll_deg: 45

obs:
  obs_scales:
    lin_vel: 2.0
    ang_vel: 0.25
    dof_pos: 1.0
    dof_vel: 0.05

reward:
  upright: 0.05
  alive: 0.01
  lin_vel: 2.0
  approach_ball: 20.0
  ball_control: 5.0
  ball_to_goal: 10.0
  goal_scored: 100.0
  fall_penalty: -10.0
  recovery_bonus: 2.0
  energy_penalty: -0.001
  tracking_sigma: 0.25

command:
  num_commands: 3
  goal_dir: [1.0, 0.0, 0.0]

train:
  algorithm:
    class_name: PPO
    clip_param: 0.2
    desired_kl: 0.01
    entropy_coef: 0.005
    gamma: 0.99
    lam: 0.95
    learning_rate: 3.0e-4
    max_grad_norm: 1.0
    num_learning_epochs: 5
    num_mini_batches: 4
    schedule: adaptive
    use_clipped_value_loss: true
    value_loss_coef: 1.0
  actor:
    class_name: MLPModel
    hidden_dims: [512, 256, 128]
    activation: elu
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 1.0
      std_type: scalar
  critic:
    class_name: MLPModel
    hidden_dims: [512, 256, 128]
    activation: elu
  obs_groups:
    actor: ["policy"]
    critic: ["policy"]
  num_steps_per_env: 8
  save_interval: 100
  logger: tensorboard
  max_iterations: 5000
