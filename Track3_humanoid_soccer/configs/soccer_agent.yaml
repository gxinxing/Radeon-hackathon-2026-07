command:
  goal_dir:
  - 1.0
  - 0.0
  - 0.0
  num_commands: 3
env:
  action_scale: 1.0
  ball_radius: 0.11
  base_init_pos:
  - 0.0
  - 0.0
  - 1.0
  base_init_quat:
  - 1.0
  - 0.0
  - 0.0
  - 0.0
  circle_radius: 1.5
  clip_actions: 100.0
  dt: 0.02
  episode_length_s: 20.0
  fall_height: 0.4
  field:
  - 14.0
  - 9.0
  goal_width: 2.6
  kd: 2.0
  kp: 50.0
  obs_history_length: 1
  penalty_area_length: 3.0
  penalty_area_width: 6.0
  resampling_time_s: 4.0
  robot_urdf: xml/walker.xml
  simulate_action_latency: false
  substeps: 1
  termination_pitch_deg: 45
  termination_roll_deg: 45
exp_name: walker_walk
num_envs: 4096
obs:
  obs_scales:
    ang_vel: 0.25
    dof_pos: 1.0
    dof_vel: 0.05
    lin_vel: 2.0
reward:
  alive: 0.005
  approach_ball: 20.0
  ball_control: 5.0
  ball_to_goal: 10.0
  energy_penalty: -0.001
  fall_penalty: -1.0
  goal_scored: 100.0
  lin_vel: 10.0
  recovery_bonus: 2.0
  tracking_sigma: 0.25
  upright: 0.02
seed: 42
show_viewer: false
task: chase
train:
  actor:
    activation: elu
    class_name: MLPModel
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 2.0
      std_type: scalar
    hidden_dims:
    - 512
    - 256
    - 128
  algorithm:
    class_name: PPO
    clip_param: 0.2
    desired_kl: 0.01
    entropy_coef: 0.01
    gamma: 0.99
    lam: 0.95
    learning_rate: 0.0003
    max_grad_norm: 1.0
    num_learning_epochs: 5
    num_mini_batches: 4
    schedule: adaptive
    use_clipped_value_loss: true
    value_loss_coef: 1.0
  critic:
    activation: elu
    class_name: MLPModel
    hidden_dims:
    - 512
    - 256
    - 128
  logger: tensorboard
  max_iterations: 5000
  num_steps_per_env: 8
  obs_groups:
    actor:
    - policy
    critic:
    - policy
  save_interval: 100
